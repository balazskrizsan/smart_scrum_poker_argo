apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ssp--local--grafana-loki-common

resources:
  - loki-deployment.yaml
  - loki-service.yaml
  - loki-ingress.yaml
  - grafana-deployment.yaml
  - grafana-service.yaml
  - grafana-ingress.yaml

configMapGenerator:
  - name: loki-config
    files:
      - local-config.yaml=loki-config.yaml
