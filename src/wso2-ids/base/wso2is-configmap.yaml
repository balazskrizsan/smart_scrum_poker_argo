apiVersion: v1
kind: ConfigMap
metadata:
  name: wso2is-config
data:
  deployment.toml: |
    [server]
    hostname = "wso2is"
    node_ip = "127.0.0.1"

    [super_admin]
    username = "admin"
    password = "admin"
    create_admin_account = true

    [[datasource]]
    id = "WSO2_CARBON_DB"
    url = "jdbc:postgresql://postgres:5432/wso2db"
    username = "wso2carbon"
    password = "wso2carbon"
    driver = "org.postgresql.Driver"

    [[datasource]]
    id = "WSO2_IDENTITY_DB"
    url = "jdbc:postgresql://postgres:5432/identitydb"
    username = "wso2carbon"
    password = "wso2carbon"
    driver = "org.postgresql.Driver"

    [[datasource]]
    id = "WSO2_USER_DB"
    url = "jdbc:postgresql://postgres:5432/userdb"
    username = "wso2carbon"
    password = "wso2carbon"
    driver = "org.postgresql.Driver"
