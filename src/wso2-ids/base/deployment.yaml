apiVersion: apps/v1
kind: Deployment
metadata:
  name: wso2is
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wso2is
  template:
    metadata:
      labels:
        app: wso2is
    spec:
      initContainers:
        - name: copy-db-scripts
          image: wso2/wso2is:7.1.0-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Copying dbscripts to PVC..."
              mkdir -p /mnt/dbscripts
              if [ -d /home/wso2carbon/wso2is-7.1.0/dbscripts ]; then
                cp -r /home/wso2carbon/wso2is-7.1.0/dbscripts/* /mnt/dbscripts/ || true
              else
                echo "Source folder not found!"
                ls -la /home/wso2carbon/wso2is-7.1.0/
              fi
              echo "Done copying."
              ls -la /mnt/dbscripts
          volumeMounts:
            - name: wso2-db-scripts
              mountPath: /mnt/dbscripts
      containers:
        - name: wso2is
          image: wso2/wso2is:7.1.0-alpine
          ports:
            - containerPort: 9443
          env:
            - name: TZ
              value: "Europe/Budapest"
          volumeMounts:
            - name: wso2-config
              mountPath: /home/wso2carbon/wso2is/repository/conf/deployment.toml
              subPath: deployment.toml
            - name: wso2-db-scripts
              mountPath: /home/wso2carbon/wso2is-7.1.0/dbscripts
      volumes:
        - name: wso2-config
          configMap:
            name: wso2is-config
        - name: wso2-db-scripts
          persistentVolumeClaim:
            claimName: wso2is-db-scripts-pvc
