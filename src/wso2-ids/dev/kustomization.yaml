apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: wso2-ids-dev
namePrefix: dev-

resources:
  - ./../base-common
  - ./../base
  - ./../base-db

patches:
  - target: { group: "batch", version: "v1", kind: "Job", name: "init-wso2-db" }
    patch: |-
      - op: "replace"
        path: "/spec/template/spec/containers/0/env/0/value"
        value: "dev-wso2is-psql"
